<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — UoB QS Rankings Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <img src="uob-logo.png" alt="University of Bahrain" onerror="this.style.display='none'" style="height:75px;object-fit:contain" />
      <h2>QS Rankings Tracker</h2>
      <p>University of Bahrain — Internal Portal</p>
    </div>

    <hr class="login-divider" />

    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" placeholder="Enter your username" id="username" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" placeholder="Enter your password" id="password" />
    </div>

    <button class="login-btn" onclick="handleLogin()">Sign In</button>

    <div class="login-footer" style="margin-top:24px">
      <div style="background:var(--gold-pale);border:1px solid #F0D88A;border-radius:8px;padding:12px;text-align:left;font-size:12px">
        <div style="font-weight:600;color:var(--blue-dark);margin-bottom:6px">Demo Credentials</div>
        <div style="color:var(--text-muted)"><strong>Admin:</strong> admin / admin123</div>
        <div style="color:var(--text-muted)"><strong>Department:</strong> it_dept / dept123</div>
      </div>
    </div>

    <div class="login-footer" style="margin-top:16px;color:var(--text-muted)">
      Having trouble? Contact the Rankings Office
    </div>
  </div>
</div>

<script>
function handleLogin() {
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value.trim();

  if (user === 'admin' && pass === 'admin123') {
    window.location.href = 'admin-dashboard.html';
  } else if ((user === 'it_dept' || user === 'hr_dept' || user === 'library') && pass === 'dept123') {
    window.location.href = 'department-tasks.html';
  } else if (!user || !pass) {
    alert('Please enter your username and password.');
  } else {
    alert('Invalid credentials. Please try again.');
  }
}

// Allow Enter key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
